spring:
  application:
    name: apirest
  profiles:
    # En local usará "dev" por defecto.
    # En Render pondrás SPRING_PROFILES_ACTIVE=prod
    active: ${SPRING_PROFILES_ACTIVE:dev}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: jose
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # IMPORTANTE: en Render pon SPRING_DATASOURCE_URL con formato JDBC
    # Ej: jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      # Para el primer deploy es mejor "update" (si dejas validate puede fallar si no existen tablas)
      ddl-auto: update
    show-sql: false

server:
  port: ${PORT:8080}