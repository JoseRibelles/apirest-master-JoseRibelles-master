<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Nou Conflicte</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h1>Afegir Nou Conflicte</h1>
<hr>

<form th:action="@{/web/conflicts/save}" th:object="${conflict}" method="post" class="col-md-6">
  <div class="mb-3">
    <label class="form-label">Nom del Conflicte:</label>
    <input type="text" th:field="*{name}" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Data d'Inici:</label>
    <input type="date" th:field="*{startDate}" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Descripció:</label>
    <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
  </div>

  <div class="mt-4">
    <button type="submit" class="btn btn-success">Guardar</button>
    <a th:href="@{/web/conflicts}" class="btn btn-secondary">Tornar enrere</a>
  </div>
</form>
</body>
</html>
